--- # itksnap

##################################################################################
# ITK-SNAP
##################################################################################

####################################
# Get vars and set paths
####################################

# Get vars from roles' vars/ directory
- name: Get package information
  ansible.builtin.set_fact:
    package: "{{ itksnap.package }}"

- name: Set task variables
  ansible.builtin.set_fact:
    package_name: "{{ package.info.name }}"
    package_version: "{{ package.info.version }}"
    package_version_build: "{{ package.src.version_build }}"
    package_arch: "{{ package.src.arch }}"
    package_os: "{{ package.src.os }}"
    package_base_url: "{{ package.src.base_url }}"
    package_checksum: "{{ package.src.checksum }}"
    base_path: "{{ local_path }}/software/{{ package.info.name }}/{{ package.info.version }}"

- name: Set download link
  ansible.builtin.set_fact:
    package_url: "{{ package_base_url }}/{{ package_name}}/{{ package_name}}/{{ package_version }}/{{ package_name | replace('-', '') }}-{{ package_version }}-{{ package_version_build }}-{{ package_os }}-{{ package_arch }}.tar.gz"

- name: Set expected paths
  ansible.builtin.set_fact:
    expected_binary_bin: "{{ base_path }}/install/bin/itksnap"

- name: Check if expected files exist for idempotency (binary in bin)
  ansible.builtin.stat:
    path: "{{ expected_binary_bin }}"
  register: check_exists_expected_binary_bin

####################################
# Download package
####################################

- name: Create temporary directory to download package archive
  ansible.builtin.tempfile:
    state: directory
    suffix: build
  register: temp_dir
  when:
    - not check_exists_expected_binary_bin.stat.exists

- name: Download the package archive with SHA256 verification
  ansible.builtin.get_url:
    url: "{{ package_url }}"
    dest: "{{ temp_dir.path }}/{{ package_url | basename }}"
    checksum: "{{ package_checksum }}"
  when:
    - not check_exists_expected_binary_bin.stat.exists

####################################
# Extract / install package
####################################

- name: Create package install location
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ package.owner.user }}"
    group: "{{ package.owner.group }}"
    mode: u=rwX,g=rX,o=rX
  loop:
    - "{{ base_path }}/install"

- name: Extract and install the package
  ansible.builtin.unarchive:
    src: "{{ temp_dir.path }}/{{ package_url | basename }}"
    dest: "{{ base_path }}/install"
    creates: "{{ base_path }}/install/bin/itksnap"
    owner: "{{ package.owner.user }}"
    group: "{{ package.owner.group }}"
    remote_src: yes
    extra_opts: [--strip-components=1,--no-same-owner]
  when:
    - not check_exists_expected_binary_bin.stat.exists

####################################
# Cleanup
####################################

- name: Cleanup temporary directory
  ansible.builtin.file:
    path: "{{ temp_dir.path }}"
    state: absent
  when: temp_dir.path is defined

####################################
# Install module
####################################

- name: Install module
  ansible.builtin.template:
    src: templates/modulefile.j2
    dest: "{{ base_path }}/module.lua"
    owner: "{{ package.owner.user }}"
    group: "{{ package.owner.group }}"
    mode: u=rw,g=r,o=r
  vars:
    module:
      module:
        category: "Module"
        vars:
          - module_name: "'{{ package.info.name }}'"
          - module_version: "'{{ package.info.version }}'"
          - module_description: "'{{ package.module.description }}'"
          - module_help: "'{{ package.module.help }}'"
        funcs:
          - whatis: [ module_description ]
          - help: [ module_help ]
      conflicts:
        category: "Conflicts"
        funcs:
          - conflict: [ module_name ]
      paths:
        category: "Paths"
        funcs:
          - prepend_path: [ "'PATH'" , "'{{ base_path }}/install/bin'" ]

- name: Link module - ensure directory is present
  ansible.builtin.file:
    path: "{{ local_path }}/modulefiles/{{ package_name }}/"
    state: directory
    owner: "{{ package.owner.user }}"
    group: "{{ package.owner.group }}"
    mode: u=rwX,g=rX,o=rX

- name: Link module - create symlink
  ansible.builtin.file:
    src: "{{ base_path }}/module.lua"
    dest: "{{ local_path }}/modulefiles/{{ package_name }}/{{ package_version }}.lua"
    owner: "{{ package.owner.user }}"
    group: "{{ package.owner.group }}"
    state: link

