# # Install module
# #- name: Install module
# # - add env/bin/R to RSTUDIO_WHICH_R
# # - add env/lib/R/lib to LD_LIBRARY_PATH
# #  tags: module
#
# # Add shared package cache to user
#
# # Link modules
- name: Install module
  ansible.builtin.template:
    src: templates/modulefile.j2
    dest: "{{ base_path }}/module.lua"
  vars:
    module:
      module:
        category: "Module"
        vars:
            - module_name: "'{{ environment_name }}'"
            - module_version: "'{{ environment_version }}'"
            - module_description: "'Global analysis environment'"
            - module_help: {"[[ A global environment for analysis containing a wide range of Python and R packages ]]" : str}
        funcs:
          - whatis: ["Name" : str, module_name]
          - whatis: ["Version" : str, module_version]
          - whatis: ["Description" : str, module_description]
          - help: [ module_help ]
      conflicts:
        category: "Conflicts"
        funcs:
            - family: [ "condaenv" : quote ]
            - conflict: [ module_name ]
      requires:
        category: "Requires"
        funcs:
          - depends_on: [ "'micromamba'" ]
      environment:
        category: "Environment"
        funcs:
          - pushenv: [ "'RSTUDIO_WHICH_R'" , "'{{ thisenv_path }}/bin/R'" ]
          - pushenv: [ "'LD_LIBRARY_PATH'" , "'{{ thisenv_path }}/lib/R/lib'" ]
          - pushenv: [ "'R_LIBS_SITE'" , "'{{ thisenv_path }}/lib/R/library'" ]
        cmds:
          - |
            execute {
                cmd = "micromamba activate " .. "{{ thisenv_path }}",
                modeA = {"load"}
            }
          - |
            execute {
                cmd = "micromamba deactivate",
                modeA = {"unload"}
            }


- name: Link module - ensure directory is present
  ansible.builtin.file:
    path: "{{ environments_path }}/modulefiles/global/{{ environment_name }}/"
    state: directory
    mode: '0755'

- name: Link module - create symlink
  ansible.builtin.file:
    src: "{{ base_path }}/module.lua"
    dest: "{{ environments_path }}/modulefiles/global/{{ environment_name }}/{{ environment_version }}.lua"
    state: link
