--- # globalenv

####################################
# Get version
- name: New version name
  ansible.builtin.set_fact:
    environment_name: "globalenv"
    environment_version: "2026-04-17" #"{{ ansible_date_time.date }}"
  tags: always

# Get environment path
# Separate task from set_fact above since it relies on variables that are set at the end of that call
- name: Defining environment path
  ansible.builtin.set_fact:
    base_path: "{{ environments_path }}/global/{{ environment_name }}/{{ environment_version }}"
    thisenv_path: "{{ environments_path }}/global/{{ environment_name }}/{{ environment_version }}/env"
  tags: always

# Setup initial directories
- name: Create required directories
  become_user: root
  ansible.builtin.file:
    path: "{{ base_path }}"
    state: directory
    owner: "{{ software_user }}"
    group: root
    mode: u=rwx,g=rx,o=rx

# Copy environment file
- name: Copying environment file
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ base_path }}/"
  with_fileglob:
    - "files/{{ environment_name }}-*.yml"

- name: Check micromamba info
  ansible.builtin.shell: |
    export MAMBA_ROOT_PREFIX="{{ root_prefix }}"
    source "{{ root_prefix }}/etc/profile.d/mamba.sh"
    mamba info
  register: debug_out

- name: Print micromamba info
  ansible.builtin.debug:
    var: debug_out.stdout_lines

# Create Conda environment
- name: Create environment
  ansible.builtin.shell: >
    export MAMBA_ROOT_PREFIX="{{ root_prefix }}"
    && source "{{ root_prefix }}/etc/profile.d/mamba.sh"
    && mamba create --quiet --yes -p "{{ thisenv_path }}" -f "{{ base_path }}/{{ environment_name }}-conda.yml"
  args:
    creates: "{{ thisenv_path }}"
  tags:
    - conda
    - trusted

