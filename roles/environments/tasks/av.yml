      - -e
      - "if (! (\"{{ item if item is string else (item.values() | first) }}\" %in% installed.packages()[,\"Package\"])) { BiocManager::install(\"{{ item if item is string else (item.keys() | first) }}\"); cat(\"Package installed\"); quit(status = 0, save = \"no\") } else { cat(\"Package exists\"); quit(status = 0, save = \"no\") }"
